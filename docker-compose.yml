services:

  postgres:
    image: postgres:16
    container_name: sogood_postgres
    restart: always
    environment:
      POSTGRES_USER: sogood
      POSTGRES_PASSWORD: sogood
      POSTGRES_DB: sogood_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: sogood_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://sogood:sogood@postgres:5432/sogood_db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: sogood_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

  spark:
    image: bitnami/spark:latest
    container_name: sogood_spark
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"

  airflow:
    image: apache/airflow:2.9.1
    container_name: sogood_airflow
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sogood:sogood@postgres:5432/sogood_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags

volumes:
  postgres_data: