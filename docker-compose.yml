services:

  postgres:
    image: postgres:16
    container_name: sogood_postgres
    restart: always
    environment:
      POSTGRES_USER: sogood
      POSTGRES_PASSWORD: sogood
      POSTGRES_DB: sogood_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  ml:
    build: ./ml
    container_name: sogood_ml
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./ml:/app
      - ./model:/app/../model
    environment:
      PYTHONUNBUFFERED: 1

  backend:
    build: ./backend
    container_name: sogood_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ml
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sogood_db
      DB_USER: sogood
      DB_PASSWORD: sogood
      PORT: 8000
      ML_API_URL: http://ml:8001
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      target: build
    container_name: sogood_frontend
    restart: always
    ports:
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master-sogood
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - INIT_DAEMON_STEP=setup_spark
    volumes:
      - ./:/opt/project

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1-sogood
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2-sogood
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  spark-worker-3:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-3-sogood
    depends_on:
      - spark-master
    ports:
      - "8084:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  airflow-postgres:
    image: postgres:16
    container_name: airflow_postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5

  # -------------------------
  # AIRFLOW
  # -------------------------
  airflow:
    build: ./airflow/
    container_name: sogood_airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__CORE__FERNET_KEY: "Msa3d0Z-F2yLbSgm3fNPTUJQVLxrJ7EZ5jZsP-K3Vqw="
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com 2>/dev/null || true &&
      airflow scheduler &
      exec airflow webserver
      "

volumes:
  postgres_data:
  airflow_db: