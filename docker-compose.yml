services:

  postgres:
    image: postgres:16
    container_name: sogood_postgres
    restart: always
    environment:
      POSTGRES_USER: sogood
      POSTGRES_PASSWORD: sogood
      POSTGRES_DB: sogood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: sogood_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sogood
      DB_USER: sogood
      DB_PASSWORD: sogood
      PORT: 8000
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: sogood_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master-sogood
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sogood
      DB_USER: sogood
      DB_PASSWORD: sogood
      PORT: 8000
    volumes:
      - ./backend:/app
      - /app/node_modules

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1-sogood
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2-sogood
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  spark-worker-3:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-3-sogood
    depends_on:
      - spark-master
    ports:
      - "8084:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./:/opt/project

  airflow:
    image: apache/airflow:2.9.1
    container_name: sogood_airflow
    restart: always
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sogood:sogood@postgres:5432/sogood
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow

volumes:
  postgres_data:
  airflow_data: